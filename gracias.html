<html lang="ca">
<head>

    <title>Mensage enviado</title>
    <link rel="stylesheet" href="CSS.css"> <style>
        .contenedor-gracias {
            display: flex;
            flex-direction: column;
            align-items: center;

            padding: 20px;
        }
        .icono-exito {
            font-size: 50px;

            margin-bottom: 20px;
        }

        .btn-volver:hover {
            background-color: #0056b3;
        }

</head>
<body>

    <main class="contenedor-gracias">
        <div class="icono-exito">✔</div>
        <h1>¡Gracias!</h1>

    </main>

</html>
